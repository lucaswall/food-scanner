name: CI

on:
  push:
    branches: [main]
    paths:
      # App paths (shared with railway.json watchPatterns)
      - "src/**"
      - "drizzle/**"
      - "public/**"
      - "middleware.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "eslint.config.mjs"
      # CI-only paths
      - "e2e/**"
      - "vitest.config.ts"
      - "playwright.config.ts"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      # App paths (shared with railway.json watchPatterns)
      - "src/**"
      - "drizzle/**"
      - "public/**"
      - "middleware.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.mjs"
      - "eslint.config.mjs"
      # CI-only paths
      - "e2e/**"
      - "vitest.config.ts"
      - "playwright.config.ts"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    needs: [lint-typecheck, unit-tests, build]
    runs-on: ubuntu-latest
    # Run inside the official Playwright image (tag pinned to the @playwright/test
    # version in package.json): browsers + system deps are pre-baked, eliminating the
    # `playwright install` browser download/extraction step that deadlocked on
    # cache-miss runs and hung the job for hours.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    # Backstop so a hung step can never block merges for GitHub's 6h default.
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: food_scanner
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          # In a container job the postgres service is reachable by its service name
          # on the job network (NOT localhost, which the runner-host mapping used).
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/food_scanner
          SESSION_SECRET: test-session-secret-min-32-chars-required-for-iron-session
          APP_URL: http://localhost:3001
          ALLOWED_EMAILS: test@example.com
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          ANTHROPIC_API_KEY: test-anthropic-key
          HEALTH_DRY_RUN: "true"
          ENABLE_TEST_AUTH: "true"
          PORT: "3001"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
